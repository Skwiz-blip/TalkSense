name: CI/CD — LYD ML Module

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/modules/ml-training/**'
      - 'ml-models/**'
      - 'migrations/**'
      - 'Dockerfile.*'
      - 'docker-compose.yml'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

env:
  NODE_VERSION:   '20'
  PYTHON_VERSION: '3.11'
  REGISTRY:        ghcr.io
  IMAGE_BACKEND:   ghcr.io/${{ github.repository }}/lyd-backend
  IMAGE_ML:        ghcr.io/${{ github.repository }}/lyd-ml-worker

# ── Jobs ──────────────────────────────────────────────────────
jobs:

  # ── 1. TypeScript lint & type-check ─────────────────────────
  ts-lint:
    name: TypeScript lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint -- --max-warnings=0

      - name: TypeScript type check
        run: npm run typecheck

  # ── 2. NestJS unit tests ─────────────────────────────────────
  ts-test:
    name: NestJS unit tests
    runs-on: ubuntu-latest
    needs: ts-lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       lyd_test
          POSTGRES_USER:     lyd
          POSTGRES_PASSWORD: lyd_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV:     test
      DB_HOST:      localhost
      DB_PORT:      5432
      DB_NAME:      lyd_test
      DB_USER:      lyd
      DB_PASSWORD:  lyd_secret
      REDIS_HOST:   localhost
      REDIS_PORT:   6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run schema migration
        run: |
          npx typeorm migration:run --dataSource src/data-source.ts
        continue-on-error: true

      - name: Jest unit tests (ML module)
        run: |
          npm run test -- \
            --testPathPattern="ml-training.spec" \
            --coverage \
            --coverageReporters=lcov,text \
            --forceExit

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: nestjs
        continue-on-error: true

  # ── 3. Python tests ──────────────────────────────────────────
  python-test:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ml-models/requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest
        run: |
          pytest ml-models/tests/ \
            -v \
            --cov=ml-models/src \
            --cov-report=lcov:coverage-python.lcov \
            --cov-report=term-missing \
            --tb=short

      - name: Upload Python coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-python.lcov
          flags: python
        continue-on-error: true

  # ── 4. Security audit ────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm audit --audit-level=high

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Python safety check
        run: |
          pip install safety
          safety check -r ml-models/requirements.txt --short-report
        continue-on-error: true

  # ── 5. Build Docker images ───────────────────────────────────
  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [ts-test, python-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context:     .
          file:        Dockerfile.backend
          push:        true
          tags:        ${{ steps.meta-backend.outputs.tags }}
          labels:      ${{ steps.meta-backend.outputs.labels }}
          cache-from:  type=gha
          cache-to:    type=gha,mode=max
          platforms:   linux/amd64,linux/arm64

      - name: Extract metadata (ML worker)
        id: meta-ml
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_ML }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ML worker image
        uses: docker/build-push-action@v5
        with:
          context:     .
          file:        Dockerfile.ml
          push:        true
          tags:        ${{ steps.meta-ml.outputs.tags }}
          labels:      ${{ steps.meta-ml.outputs.labels }}
          cache-from:  type=gha
          cache-to:    type=gha,mode=max
          platforms:   linux/amd64

  # ── 6. Deploy to staging ─────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/lyd
            docker compose pull backend ml-worker
            docker compose up -d --no-deps backend ml-worker
            docker compose exec -T backend node dist/main migrate
            echo "✅ Staging deployment complete"

  # ── 7. Deploy to production ───────────────────────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url:  https://api.livydream.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (rolling)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/lyd
            # Pull new images
            docker compose pull backend ml-worker
            # Run DB migrations first
            docker compose run --rm backend node dist/main migrate
            # Rolling restart (zero-downtime with 2+ replicas)
            docker compose up -d --no-deps --scale backend=2 backend
            sleep 30
            docker compose up -d --no-deps --scale backend=1 backend
            docker compose up -d --no-deps ml-worker
            echo "✅ Production deployment complete: $(date)"

      - name: Smoke test
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://api.livydream.com/api/ml-training/status \
            -H "Authorization: Bearer ${{ secrets.SMOKE_TEST_TOKEN }}")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Smoke test failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Smoke test passed"

      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status:        failure
          channel:       '#alerts-prod'
          webhook_url:   ${{ secrets.SLACK_WEBHOOK }}
          text:          '❌ Production deploy failed for ${{ github.sha }}'
